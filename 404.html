<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>Страница не найдена — bytemaster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0B0D0E;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #EDEDED;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .content {
            max-width: 500px;
        }

        p {
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: #CCD6DD;
        }

        a {
            color: #7FCFC1;
            text-decoration: none;
            border-bottom: 1px solid #7FCFC1;
            transition: 0.2s;
        }

        a:hover {
            color: #ffffff;
            border-bottom-color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="content">
        <p>Страница не найдена</p>
        <p>Вернуться на <a href="/">главную</a></p>
    </div>
</body>
</html>
